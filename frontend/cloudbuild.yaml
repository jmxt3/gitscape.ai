substitutions:
  _IMAGE_TAG: latest  # overridden automatically by CI with $COMMIT_SHA
  _API_HOST: api.gitscape.ai

steps:
  # ── Step 1: Build the Docker image (nginx serving the dist/) ─────────────────
  # The Dockerfile multi-stage handles npm install + vite build internally.
  # VITE_API_HOST is passed as a build-arg so the production URL is baked in.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '--tag'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:$_IMAGE_TAG'
      - '--tag'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:latest'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:latest'
      - '--build-arg'
      - 'VITE_API_HOST=$_API_HOST'
      - '.'

  # ── Step 2: Push both tags to Artifact Registry ───────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web'

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gitscape-web'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:$_IMAGE_TAG'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--timeout'
      - '60s'
      - '--memory'
      - '256Mi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'

# Store the built image in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:$_IMAGE_TAG'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gitscape-web:latest'

# Options for Cloud Build execution
options:
  # CLOUD_LOGGING_ONLY requires using 'gcloud beta builds submit' to stream logs locally.
  logging: CLOUD_LOGGING_ONLY
