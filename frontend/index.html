        "name": "What is Git Scape AI?",

          "@type": "Answer",

        }
      },
      {
        "@type": "Question",
        "name": "What is a Code Digest?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A Code Digest is a clean, flat text representation of a GitHub repository's source code. It concatenates all relevant files into a single document optimized for LLM context windows, making it easy to feed any codebase into ChatGPT, Claude, Gemini, or any other AI model."
        }
      },
      {
        "@type": "Question",
        "name": "What is Agent Skill?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Agent Skill generates a SKILL.md file — a structured knowledge document that AI coding agents can load to instantly understand a repository's purpose, architecture, patterns, and conventions. It lets your AI agent act on the codebase without needing to re-read every file."
        }
      },
      {
        "@type": "Question",
        "name": "What is Code Visualization?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Code Visualization renders an interactive, zoomable diagram of your repository's file and directory structure, making it easy to explore and understand the architecture of any codebase at a glance."
        }
      },
      {
        "@type": "Question",
        "name": "Does Git Scape AI support private repositories?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. You can add a GitHub Personal Access Token (PAT) via the token button in the top-right corner. This also raises your API rate limit from 60 to 5,000 requests per hour."
        }
      },
      {
        "@type": "Question",
        "name": "Is Git Scape AI free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, Git Scape AI is completely free to use for public repositories. No account or sign-up is required."
        }
      }
    ]
  }
