map $http_user_agent $is_bot {
  default 0;
  ~*googlebot 1;
  ~*bingbot 1;
  ~*slurp 1;
  ~*duckduckbot 1;
  ~*baiduspider 1;
  ~*yandexbot 1;
  ~*sogou 1;
  ~*exabot 1;
  ~*facebot 1;
  ~*ia_archiver 1;
  ~*twitterbot 1;
  ~*linkedinbot 1;
  ~*whatsapp 1;
  ~*Discordbot 1;
  ~*Slackbot 1;
  ~*facebookexternalhit 1;
}

server {
  listen 8080;
  client_max_body_size 32M;
  root /usr/share/nginx/html;
  index index.html;

  # Bot SSR: proxy crawlers hitting /registry/{owner}/{repo} to the FastAPI SSR renderer
  location ~ ^/registry/([^/]+)/([^/]+)$ {
    if ($is_bot) {
      rewrite ^/registry/([^/]+)/([^/]+)$ /api/registry/render/$1/$2 last;
    }
    # Regular users get the React SPA
    try_files $uri $uri/ /index.html;
  }

  # Serve the React SPA — client-side routing fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy all /api/* requests to the FastAPI sidecar
  # The trailing slash strips the /api prefix so FastAPI sees /converter, etc.
  location /api/ {
    proxy_pass         http://127.0.0.1:8081/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
  }

  # Optional: gzip static assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 256;
}
