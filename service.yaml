apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gitscape
  annotations:
    # All external traffic hits the nginx ingress container
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle; max 10 instances
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Set the ingress container name (nginx) so Cloud Run knows which port to expose
        run.googleapis.com/container-dependencies: '{"nginx":["api"]}'
    spec:
      serviceAccountName: gitscape-sa@gitscape-501903.iam.gserviceaccount.com
      # 5 concurrent requests per instance (matching previous API setting)
      containerConcurrency: 5
      # Max 300s — matches the long-running /converter endpoint
      timeoutSeconds: 300
      containers:

        # ── Ingress container (receives all public HTTPS traffic) ──────────────────
        # nginx serves the React SPA and proxies /api/* to the FastAPI sidecar.
        # This is the ONLY container that exposes a port to the internet.
        - name: nginx
          image: us-central1-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/gitscape-web:IMAGE_TAG
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            failureThreshold: 3

        # ── Sidecar container (private — only reachable via localhost from nginx) ──
        # FastAPI binds to 127.0.0.1:8081. No port is exposed to the internet.
        - name: api
          image: us-central1-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/gitscape-api:IMAGE_TAG
          env:
            - name: PORT
              value: "8081"
            - name: ENVIRONMENT
              value: production
            - name: GITSCAPE_REGISTRY_BUCKET
              value: gitscape-registry-scans
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: GITSCAPE_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: API_KEY
                  key: latest
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 30
            failureThreshold: 3
